<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PullBid Live</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #fafafa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      p { opacity: 0.7; font-size: 14px; }
    </style>
  </head>
  <body>
    <!--
      This is the Capacitor native shell entry point. The TanStack Start app is
      server-rendered (no static index.html is produced by the build), so the
      native app loads the hosted web app via `server.url` in capacitor.config.ts.
      This file is only shown briefly while the WebView connects, or offline.
    -->
    <div class="wrap">
      <div class="spinner"></div>
      <p>Loading PullBid Live…</p>
    </div>
  </body>
</html>
