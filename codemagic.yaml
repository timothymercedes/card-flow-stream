# Codemagic CI/CD — PullBid Live (no Mac required)
# android-internal runs on Linux only (no env_versions / Xcode inheritance).
#
# Builds the TanStack web app, wraps it with Capacitor, compiles signed
# native binaries on Codemagic's macOS/Linux runners, and ships them to
# TestFlight (iOS) and Google Play Internal Testing (Android).
#
# The native ios/ and android/ folders are NOT committed to git — they are
# generated fresh in CI by `npx cap add`, then patched (permissions,
# capabilities, Firebase configs, signing) before building.

definitions:
  env_versions: &env_versions
    node: v22.14.0

    xcode: latest
    cocoapods: default

workflows:
  # ------------------------------------------------------------------ #
  #  iOS  ->  TestFlight                                                #
  # ------------------------------------------------------------------ #
  ios-testflight:
    name: PullBid Live — iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      <<: *env_versions
      groups:
        # APP_STORE_CONNECT_* authenticate the API key (used for auto-signing,
        # build-number lookup, and the TestFlight upload). CERTIFICATE_PRIVATE_KEY
        # is the RSA key Codemagic uses to create/fetch the distribution cert.
        - app_store_credentials      # APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, CERTIFICATE_PRIVATE_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pullbidlive.app
      vars:
        BUNDLE_ID: "com.pullbidlive.app"
        # PROFILE_NAME is informational only — signing matches on BUNDLE_ID, not the exact name.
        PROFILE_NAME: "Pull Bid Live App Store Profile"
        APP_STORE_APPLE_ID: "6774468951"   # numeric App Store Connect App ID
        XCODE_SCHEME: "App"


    scripts:
      - name: Install dependencies
        script: |
          npm install -g bun
          bun install
      - name: Verify native auth env vars (fail fast)
        script: |
          # Fails the build if any var required for the native auth sheet is
          # missing/empty, and prints exactly which auth path each provider
          # will use. Prevents shipping a build that silently uses browser OAuth.
          node scripts/verify-auth-env.mjs ios
      - name: Build web bundle (SSR, hosted shell)
        script: |
          bun run build
          test -f capacitor-shell/index.html


      - name: Add iOS platform & sync
        script: |
          bunx cap add ios
          bunx cap sync ios
          # Capacitor 8 uses Swift Package Manager (no CocoaPods / no .xcworkspace)
          test -d ios/App/App.xcodeproj

      - name: Generate app icons & splash (incl. 1024 App Store icon)
        script: |
          bunx @capacitor/assets generate \
            --assetPath assets \
            --ios \
            --iconBackgroundColor "#0a0a0a" \
            --iconBackgroundColorDark "#0a0a0a" \
            --splashBackgroundColor "#0a0a0a" \
            --splashBackgroundColorDark "#0a0a0a"
          # Verify the required 1024x1024 App Store marketing icon was produced
          ICONSET=ios/App/App/Assets.xcassets/AppIcon.appiconset
          test -f "$ICONSET/AppIcon-512@2x.png"
          test -f "$ICONSET/Contents.json"



      - name: Drop in Firebase config (GoogleService-Info.plist)
        script: |
          cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
      - name: Inject Info.plist permission strings
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'PullBid Live uses your camera to scan cards and stream live.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'PullBid Live uses your camera to scan cards and stream live.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'PullBid Live uses your microphone for live audio during streams.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'PullBid Live uses your microphone for live audio during streams.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'PullBid Live needs photo access to upload card images.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'PullBid Live needs photo access to upload card images.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'PullBid Live saves shared cards to your photo library.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'PullBid Live saves shared cards to your photo library.'" "$PLIST"
      - name: Add Push + Associated Domains entitlements
        script: |
          ENT=ios/App/App/App.entitlements
          if [ ! -f "$ENT" ]; then
            cat > "$ENT" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          PLIST
          fi
          # Associated Domains — lets iOS route Universal Links (incl. the OAuth
          # return URL) from Safari/SFSafariViewController back into the app.
          /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.associated-domains" "$ENT" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.associated-domains array" "$ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.associated-domains:0 string applinks:pullbidlive.com" "$ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.associated-domains:1 string applinks:www.pullbidlive.com" "$ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.associated-domains:2 string webcredentials:pullbidlive.com" "$ENT"
          # Sign In with Apple capability — required for the native Apple sheet.
          /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.applesignin" "$ENT" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin array" "$ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin:0 string Default" "$ENT"
          # remote-notification background mode
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" ios/App/App/Info.plist 2>/dev/null || true
          # Custom OAuth callback scheme used by the native broker fallback.
          P=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$P" 2>/dev/null || true
          IDX=$(/usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$P" 2>/dev/null | grep -c "Dict" || echo 0)
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX dict" "$P"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLName string com.pullbidlive.app.oauth" "$P"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLSchemes array" "$P"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLSchemes:0 string pullbidlive" "$P"
          # Google native Sign-In needs the reversed iOS client ID as a URL scheme.
          # Set GOOGLE_IOS_REVERSED_CLIENT_ID in Codemagic env (e.g. com.googleusercontent.apps.XXXX).
          if [ -n "$GOOGLE_IOS_REVERSED_CLIENT_ID" ]; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$P" 2>/dev/null || true
            IDX=$(/usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$P" 2>/dev/null | grep -c "Dict" || echo 0)
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX dict" "$P"
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLName string google" "$P"
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLSchemes array" "$P"
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLSchemes:0 string $GOOGLE_IOS_REVERSED_CLIENT_ID" "$P"
          fi

      - name: Increment build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))
      - name: Set up code signing (App Store Connect API key)
        script: |
          echo "Using PullBid Live auto-signing config v8: matching any App Store profile for $BUNDLE_ID"
          require_env() {
            name="$1"
            eval "value=\${$name:-}"
            if [ -z "$value" ]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          }
          # Auto-signing: the App Store Connect API key + CERTIFICATE_PRIVATE_KEY let
          # Codemagic create/fetch the distribution certificate and provisioning
          # profile from Apple, then install them in the keychain.
          require_env APP_STORE_CONNECT_PRIVATE_KEY
          require_env APP_STORE_CONNECT_KEY_IDENTIFIER
          require_env APP_STORE_CONNECT_ISSUER_ID
          require_env CERTIFICATE_PRIVATE_KEY
          # --- Credential diagnostics (private key stays masked) ---
          # A 401 NOT_AUTHORIZED almost always means the values stored in the
          # app_store_credentials group don't match a valid API key. Verify the
          # Key ID and Issuer ID actually in use match the expected pair:
          #   Expected KEY ID    : NUD5JWPWV8
          #   Expected ISSUER ID : 9c17757b-2565-42c8-b52c-add9e4b65302
          echo "Key ID in use    : $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer ID in use : $APP_STORE_CONNECT_ISSUER_ID"
          if [ "$APP_STORE_CONNECT_KEY_IDENTIFIER" != "NUD5JWPWV8" ]; then
            echo "WARNING: Key ID does not match the expected NUD5JWPWV8 — update the app_store_credentials group."
          fi
          if [ "$APP_STORE_CONNECT_ISSUER_ID" != "9c17757b-2565-42c8-b52c-add9e4b65302" ]; then
            echo "WARNING: Issuer ID does not match the expected value — update the app_store_credentials group."
          fi
          # Sanity-check the .p8 private key shape without printing it.
          case "$APP_STORE_CONNECT_PRIVATE_KEY" in
            *"BEGIN PRIVATE KEY"*) echo "Private key format: OK (PEM .p8 contents detected)";;
            *) echo "WARNING: APP_STORE_CONNECT_PRIVATE_KEY does not contain a PEM header — paste the full .p8 file contents (including BEGIN/END lines).";;
          esac
          # Fail fast with a clear auth error before any signing work.
          app-store-connect list-certificates --type IOS_DISTRIBUTION >/dev/null || {
            echo "App Store Connect authentication FAILED (401). Check Key ID / Issuer ID / private key in the app_store_credentials group."
            exit 1
          }
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --strict-match-identifier \
            --create
          keychain add-certificates
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          test -n "$(find "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" -name '*.mobileprovision' -print -quit 2>/dev/null)"
          echo "Installed provisioning profiles:"
          # We do NOT require an exact profile name. Whatever App Store profile
          # `app-store-connect fetch-signing-files` installs for $BUNDLE_ID is
          # accepted — we only verify a profile matching the bundle id exists.
          FOUND_MATCHING_PROFILE=0
          while IFS= read -r profile; do
            decoded_profile="$(mktemp)"
            security cms -D -i "$profile" > "$decoded_profile"
            profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$decoded_profile" 2>/dev/null || true)"
            profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$decoded_profile" 2>/dev/null || true)"
            profile_app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$decoded_profile" 2>/dev/null || true)"
            rm -f "$decoded_profile"
            echo "- ${profile_name:-unknown} (${profile_uuid:-unknown}) ${profile_app_id:-unknown} :: $profile"
            # application-identifier is "<TEAMID>.com.pullbidlive.app" — match on the bundle id suffix.
            case "$profile_app_id" in
              *".$BUNDLE_ID") FOUND_MATCHING_PROFILE=1 ;;
            esac
          done < <(find "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" -name '*.mobileprovision' -print 2>/dev/null)
          if [ "$FOUND_MATCHING_PROFILE" != "1" ]; then
            echo "Did not detect any provisioning profile matching bundle id '$BUNDLE_ID'"
            exit 1
          fi
          PROFILE_ARGS=()
          while IFS= read -r profile; do
            PROFILE_ARGS+=(--profile "$profile")
          done < <(find "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" -name '*.mobileprovision' -print 2>/dev/null)
          security find-identity -v -p codesigning
          cd ios/App
          # use-profiles MUST be the last step before build so nothing rewrites
          # project.pbxproj after the signing settings are applied. Run it from
          # the directory that contains App.xcodeproj so the generated Capacitor
          # project is patched instead of being skipped from the repo root.
          xcode-project use-profiles \
            --project App.xcodeproj \
            "${PROFILE_ARGS[@]}" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging \
            --verbose
          xcodebuild -project App.xcodeproj -scheme "$XCODE_SCHEME" -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER"
          xcodebuild -project App.xcodeproj -scheme "$XCODE_SCHEME" -showBuildSettings | awk -F'= ' '/PROVISIONING_PROFILE_SPECIFIER =/ && length($2) > 0 { found=1 } END { exit(found ? 0 : 1) }'
      - name: Build & archive .ipa
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist"


    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY        # contents of the .p8 key (in app_store_credentials group)
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER      # the Key ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID        # the Issuer ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"



  # ------------------------------------------------------------------ #
  #  Android  ->  Google Play Internal Testing                         #
  # ------------------------------------------------------------------ #
  android-internal:
    name: PullBid Live — Android (Play Internal)
    # Android runs on Codemagic's default Linux runner for the current plan.
    # Do not set instance_type, machine, runner, or inherit Mac/Xcode settings.
    max_build_duration: 60
    environment:
      # Android-only env: just Node. Do NOT pull in the shared *env_versions
      # anchor, which carries Mac-specific xcode/cocoapods settings.
      node: 22
      # Reference the keystore uploaded under Code Signing Identities
      # (reference name "keystore_credentials"). Codemagic decrypts it and
      # exposes CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS,
      # CM_KEY_PASSWORD automatically — no Environment Variable Group needed.
      android_signing:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.pullbidlive.app"
    scripts:
      - name: Install dependencies
        script: |
          npm install -g bun
          bun install
      - name: Verify native auth env vars (fail fast)
        script: |
          # Android native Google sheet needs VITE_GOOGLE_WEB_CLIENT_ID; Apple /
          # reversed iOS scheme are iOS-only and only reported here.
          node scripts/verify-auth-env.mjs android
      - name: Build web bundle (SSR, hosted shell)
        script: |
          bun run build
          test -f capacitor-shell/index.html


      - name: Add Android platform & sync
        script: |
          bunx cap add android || true
          bunx cap sync android
      - name: Inject App Links intent-filter (deep-link return)
        script: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Lets Android verify domain ownership (via /.well-known/assetlinks.json)
          # and route App Links (incl. the OAuth return URL) back into the app.
          if ! grep -q 'android:host="pullbidlive.com"' "$MANIFEST"; then
            python3 - "$MANIFEST" <<'PY'
          import sys
          path = sys.argv[1]
          src = open(path).read()
          block = (
              '            <intent-filter android:autoVerify="true">\n'
              '                <action android:name="android.intent.action.VIEW" />\n'
              '                <category android:name="android.intent.category.DEFAULT" />\n'
              '                <category android:name="android.intent.category.BROWSABLE" />\n'
              '                <data android:scheme="https" android:host="pullbidlive.com" />\n'
              '                <data android:scheme="https" android:host="www.pullbidlive.com" />\n'
              '            </intent-filter>\n'
          )
          # Insert before the first closing </activity> (the main launcher activity).
          idx = src.index('</activity>')
          src = src[:idx] + block + src[idx:]
          open(path, 'w').write(src)
          print('App Links intent-filter injected.')
          PY
          else
            echo "App Links intent-filter already present."
          fi
          if ! grep -q 'android:scheme="pullbidlive"' "$MANIFEST"; then
            python3 - "$MANIFEST" <<'PY'
          import sys
          path = sys.argv[1]
          src = open(path).read()
          if 'android:launchMode=' not in src:
              src = src.replace('android:name=".MainActivity"', 'android:name=".MainActivity"\n            android:launchMode="singleTask"', 1)
          block = (
              '            <intent-filter>\n'
              '                <action android:name="android.intent.action.VIEW" />\n'
              '                <category android:name="android.intent.category.DEFAULT" />\n'
              '                <category android:name="android.intent.category.BROWSABLE" />\n'
              '                <data android:scheme="pullbidlive" android:host="auth" android:pathPrefix="/callback" />\n'
              '            </intent-filter>\n'
          )
          idx = src.index('</activity>')
          src = src[:idx] + block + src[idx:]
          open(path, 'w').write(src)
          print('Custom OAuth callback scheme injected.')
          PY
          else
            echo "Custom OAuth callback scheme already present."
          fi

      # Java 17 is enforced via android-config/java17.init.gradle, passed to
      # gradlew with --init-script in the "Build signed .aab" step below. No
      # Gradle code is inlined in this YAML file.
      - name: Drop in Firebase config (google-services.json)
        script: |
          cp android-config/google-services.json android/app/google-services.json
      - name: Verify Android signing identity
        script: |
          # Codemagic already decrypted the uploaded keystore to $CM_KEYSTORE_PATH
          # and set CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS / CM_KEY_PASSWORD.
          require_env() {
            name="$1"
            eval "value=\${$name:-}"
            if [ -z "$value" ]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          }
          require_env CM_KEYSTORE_PATH
          require_env CM_KEYSTORE_PASSWORD
          require_env CM_KEY_ALIAS
          require_env CM_KEY_PASSWORD
          test -f "$CM_KEYSTORE_PATH"
          echo "Using Codemagic Android signing identity: $CM_KEY_ALIAS"

      - name: Set version code from build number
        script: |
          cd android
          sed -i "s/versionCode .*/versionCode $(($PROJECT_BUILD_NUMBER + 1))/" app/build.gradle || true
      - name: Build signed .aab
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            --init-script ../android-config/java17.init.gradle \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    # Publishing to Google Play is disabled until GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    # is configured in the google_play_credentials group. Re-enable by adding:
    #   - google_play_credentials to environment.groups above
    #   publishing:
    #     google_play:
    #       credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #       track: internal
    #       submit_as_draft: false
